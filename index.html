<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <title>Library Management</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" />

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet" />

    <style>
        * {
            font-family: "Roboto", sans-serif;
        }

        .library-bg {
            min-height: 100vh;
            background-color: #ffffff;
        }

        .search-container {
            background-image: url("https://assets.ccbp.in/frontend/dynamic-webapps/library-management-bg.png");
            background-size: cover;
            padding: 40px;
            color: #ffffff;
        }

        .heading {
            font-size: 36px;
            font-weight: bold;
        }

        .results-container {
            padding: 20px;
        }

        .book-card {
            width: 150px;
            margin: 10px;
            text-align: center;
        }

        .book-card img {
            width: 100%;
            height: 200px;
        }

        .book-card p {
            margin-top: 8px;
            color: #323f4b;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="library-bg">
        <div class="search-container text-center">
            <h1 class="heading">Library Management</h1>

            <div class="input-group mb-3">
                <input type="search" id="searchInput" class="form-control" placeholder="Type book title" />
            </div>

            <div class="spinner-border text-primary d-none" id="spinner" role="status">
                <span class="sr-only">Loading...</span>
            </div>
        </div>

        <div class="results-container">
            <h3>Popular Books</h3>
            <div id="searchResults" class="d-flex flex-wrap"></div>
        </div>
    </div>

    <script>
        const searchInput = document.getElementById("searchInput");
        const searchResults = document.getElementById("searchResults");
        const spinner = document.getElementById("spinner");

        function createAndAppendBook(book) {
            const bookCard = document.createElement("div");
            bookCard.classList.add("book-card");

            const bookImg = document.createElement("img");
            bookImg.src = book.imageLink;
            bookImg.alt = book.title;

            const authorEl = document.createElement("p");
            authorEl.textContent = book.author;

            bookCard.appendChild(bookImg);
            bookCard.appendChild(authorEl);

            searchResults.appendChild(bookCard);
        }

        searchInput.addEventListener("keydown", function (event) {
            if (event.key === "Enter") {
                const searchValue = searchInput.value;
                searchResults.textContent = "";
                spinner.classList.remove("d-none");

                fetch("https://apis.ccbp.in/book-store?title=" + searchValue)
                    .then(function (response) {
                        return response.json();
                    })
                    .then(function (data) {
                        spinner.classList.add("d-none");

                        const books = data.search_results;

                        if (books.length === 0) {
                            searchResults.textContent = "No results found";
                        } else {
                            for (let book of books) {
                                createAndAppendBook(book);
                            }
                        }
                    });
            }
        });
    </script>
</body>

</html>
